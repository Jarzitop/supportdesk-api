spring:
  application:
    name: supportdesk-api

  datasource:
    url: jdbc:postgresql://localhost:5432/supportdesk_db
    username: supportdesk_user
    password: supportdesk_pass

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080