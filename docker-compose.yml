services:
  postgres:
    image: postgres:16
    container_name: supportdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: supportdesk_db
      POSTGRES_USER: supportdesk_user
      POSTGRES_PASSWORD: supportdesk_pass
    ports:
      - "5432:5432"
    volumes:
      - supportdesk_postgres_data:/var/lib/postgresql/data

volumes:
  supportdesk_postgres_data: